id: real-estate-whatsapp-llm
name: Real Estate WhatsApp Agent (OpenRouter Drafting)
mode: approval_first

persona:
  role: real estate intake assistant
  tone: practical, short, human
  objective: qualify property questions and viewing requests from WhatsApp-style inbound messages

llm:
  enabled: true
  provider: openrouter
  model: google/gemma-4-26b-a4b-it:free

policy:
  auto_reply: false
  require_approval_for:
    - customer_message
    - viewing_request
  max_reply_chars: 700

memory:
  adapter: jsonl
  path: data/real-estate-whatsapp-llm-events.jsonl

real_estate:
  db_path: data/real-estate.sqlite

channels:
  whatsapp_phone:
    enabled: true
    adapter: whatsapp_phone
    mode: webhook
    note: Accepts Hermes Baileys bridge events, Twilio form payloads, and WhatsApp Cloud API-style payloads over HTTP.

tools:
  - extract_real_estate_request
  - match_real_estate_listings
  - create_real_estate_viewing
  - draft_real_estate_reply
  - log_real_estate_conversation
  - real_estate_digest
  - notify_owner

routes:
  default:
    steps:
      - extract_real_estate_request
      - match_real_estate_listings
      - draft_real_estate_reply
      - log_real_estate_conversation
  viewing:
    when:
      any:
        - viewing
        - visit
        - tour
        - see the apartment
        - bratislava
    steps:
      - extract_real_estate_request
      - match_real_estate_listings
      - create_real_estate_viewing
      - draft_real_estate_reply
      - log_real_estate_conversation
      - notify_owner
